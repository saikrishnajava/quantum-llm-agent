# Hybrid Quantum-Classical LLM Model Configurations

# --- Phase 1: 12-Qubit Proof of Concept ---
proof_of_concept:
  vocab_size: 10000
  d_model: 128
  n_layers: 2
  n_heads: 4
  quantum_heads_per_layer: 1
  d_ff: 512
  max_seq_length: 128
  dropout: 0.1
  quantum:
    use_quantum_embedding: true
    embedding_qubits: 6
    attention_qubits: 6
    activation_qubits: 4
    use_quantum_activation: true

# --- Phase 1: Small Research Model ---
small:
  vocab_size: 30000
  d_model: 256
  n_layers: 4
  n_heads: 8
  quantum_heads_per_layer: 2
  d_ff: 1024
  max_seq_length: 512
  dropout: 0.1
  quantum:
    use_quantum_embedding: true
    embedding_qubits: 8
    attention_qubits: 8
    activation_qubits: 6
    use_quantum_activation: true

# --- Phase 2: Medium Research Prototype ---
medium:
  vocab_size: 50000
  d_model: 512
  n_layers: 8
  n_heads: 12
  quantum_heads_per_layer: 2
  d_ff: 2048
  max_seq_length: 1024
  dropout: 0.1
  quantum:
    use_quantum_embedding: true
    embedding_qubits: 10
    attention_qubits: 12
    activation_qubits: 8
    use_quantum_activation: true

# --- Phase 3: Full Scale ---
large:
  vocab_size: 50000
  d_model: 768
  n_layers: 12
  n_heads: 12
  quantum_heads_per_layer: 2
  d_ff: 3072
  max_seq_length: 2048
  dropout: 0.1
  quantum:
    use_quantum_embedding: true
    embedding_qubits: 12
    attention_qubits: 16
    activation_qubits: 8
    use_quantum_activation: true

# --- Adaptive Qubit MoE ---
moe_small:
  vocab_size: 10000
  d_model: 64
  n_layers: 1
  n_heads: 4
  quantum_heads_per_layer: 1
  d_ff: 128
  max_seq_length: 64
  dropout: 0.0
  quantum:
    use_quantum_embedding: false
    embedding_qubits: 3
    attention_qubits: 6
    activation_qubits: 3
    use_quantum_activation: false
    use_moe: true
    moe_qubit_configs: [6, 9, 12]
    moe_temperature: 1.0
